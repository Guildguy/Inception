services:
  wordpress:
    build: 
      context: ./requirements/wordpress
    container_name: wordpress
    restart: always
    expose:
      - "9000"
    volumes:
      - wp-data:/var/www/wordpress
    networks:
      - inception
  nginx:
    build:
      context: ./requirements/nginx
    container_name: nginx
    ports: 
      - "8080:80"
    volumes:
      - wp-data:/var/www/wordpress:ro
    depends_on:
      - wordpress
    networks:
      - inception

volumes:
  wp-data:

networks:
    inception:
      driver: bridge