services:
  mariadb:
    build:
      context: ./requirements/mariadb
    container_name: mariadb
    restart: always
    expose:
      - "3306"
    volumes:
      - mysql:/var/lib/mysql
    environment:
      - DB_NAME: ${DB_NAME}
      - DB_USER: ${DB_USER}
      - db_password
      - db_root_password
  wordpress:
    build: 
      context: ./requirements/wordpress
    container_name: wordpress
    restart: always
    expose:
      - "9000"
    volumes:
      - wp-data:/var/www/wordpress
    networks:
      - inception
  nginx:
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    build:
      context: ./requirements/nginx
    container_name: nginx
    ports: 
      - "8080:80"
    volumes:
      - wp-data:/var/www/wordpress:ro
    depends_on:
      - wordpress
    networks:
      - inception

volumes:
  mysql:
  wp-data: 

networks:
    inception:
      driver: bridge

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt